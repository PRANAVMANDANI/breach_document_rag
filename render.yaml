# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard -> New -> Blueprint -> select this repo.
# Render finds this file automatically and provisions both services below.
#
# The backend runs from backend/Dockerfile (Render sets $PORT for you).
# The frontend is a static site (Vite bakes VITE_API_URL in at build time,
# so it can't be a runtime env var inside a generic Docker image the way
# the backend's config is — a static build is the standard, free way to
# host a Vite/React SPA on Render). Use frontend/Dockerfile + docker-compose
# if you'd rather run/test the frontend as a container locally.

services:
  - type: web
    name: breach-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DB_NAME
        value: rag_pdf_db
      - key: LLM_PROVIDER
        value: groq
      - key: CORS_ORIGINS
        value: '["https://breach-frontend.onrender.com"]' # update after the frontend service is live
      - key: MONGODB_URI
        sync: false # paste your MongoDB Atlas connection string in the Render dashboard
      - key: GROQ_API_KEY
        sync: false # https://console.groq.com/
      - key: TAVILY_API_KEY
        sync: false # https://tavily.com

  - type: web
    name: breach-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://breach-backend.onrender.com/api # update to match your actual backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

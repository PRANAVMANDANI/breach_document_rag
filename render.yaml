services:
  # Backend Web Service
  - type: web
    name: rag-document-qa-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: 8000
      - key: DB_NAME
        value: rag_pdf_db
      - key: LLM_PROVIDER
        value: groq
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: CORS_ORIGINS
        value: '["https://your-frontend-domain.vercel.app"]' # Replace with your Vercel URL
      - key: MONGODB_URI
        sync: false # User will be prompted to enter this in the UI
      - key: GEMINI_API_KEY
        sync: false # User will be prompted to enter this in the UI (for embeddings)
      - key: GROQ_API_KEY
        sync: false # User will be prompted to enter this in the UI (for LLM)

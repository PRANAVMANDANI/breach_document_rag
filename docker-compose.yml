services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override whatever's in .env: inside the compose network, Mongo is
      # reachable by service name, not localhost.
      MONGODB_URI: mongodb://mongo:27017
      CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
